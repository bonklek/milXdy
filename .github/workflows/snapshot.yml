name: Snapshot Build
run-name: Snapshot ${{ inputs.snapshot_label }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      snapshot_label:
        description: "Short label for the snapshot artifact, such as 0.2.2-snapshot-1"
        required: true
        default: "manual"
        type: string
      retention_days:
        description: "Artifact retention in days"
        required: true
        default: "14"
        type: choice
        options:
          - "3"
          - "7"
          - "14"
          - "30"

permissions:
  contents: read

jobs:
  snapshot:
    name: Package Snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Chromium
        run: npm run build:chromium

      - name: Build Firefox
        run: npm run build:firefox

      - name: Verify update checks
        run: npm run verify:update-check

      - name: Verify URL allowlist
        run: npm run verify:url-allowlist

      - name: Verify platform
        run: npm run verify:platform

      - name: Verify extension smoke
        run: npm run verify:smoke:020

      - name: Verify app smoke
        run: npm run verify:app-smoke:020

      - name: Package release archives
        run: npm run package:release

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: milXdy-snapshot-${{ inputs.snapshot_label }}-${{ github.run_number }}-${{ github.sha }}
          path: |
            release/*.zip
            release/*.sha256
          retention-days: ${{ inputs.retention_days }}

      - name: Write snapshot summary
        run: |
          {
            echo "## milXdy Snapshot Build"
            echo ""
            echo "- Label: ${{ inputs.snapshot_label }}"
            echo "- Source ref: ${{ github.ref_name }}"
            echo "- Source commit: ${{ github.sha }}"
            echo "- Retention: ${{ inputs.retention_days }} days"
            echo ""
            echo "Snapshot artifacts are temporary manual test builds. They are not GitHub Releases and are not used by the normal updater."
          } >> "$GITHUB_STEP_SUMMARY"
