<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">milXdy MX square logo with blue bevel border</title>
  <desc id="desc">Square milXdy mark with a lowercase pink m and a large uppercase X over a cloud-derived blue halftone background with a beveled blue frame.</desc>
  <defs>
    <style>
      .word {
        fill: #ff19d8;
