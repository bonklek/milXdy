        font-size: 138px;
        font-weight: 800;
        paint-order: stroke fill;
        stroke: #ffffff;
        stroke-linejoin: round;
        stroke-width: 12px;
      }

      .x-main {
        fill: #ff19d8;
        paint-order: stroke fill;
        stroke: #ffffff;
        stroke-linejoin: round;
        stroke-width: 34px;
      }
    </style>
  </defs>

